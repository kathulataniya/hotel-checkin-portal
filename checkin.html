<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Check-In</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-primary shadow">
<div class="container">
<a class="navbar-brand fw-bold" href="#">🏨 Hotel Portal</a>
<button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>
<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">
<li class="nav-item"><a class="nav-link active" href="checkin.html">Check-In</a></li>
<li class="nav-item"><a class="nav-link" href="room.html">Room Assign</a></li>
<li class="nav-item"><a class="nav-link" href="key.html">Digital Key</a></li>
<li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
<li class="nav-item"><a class="nav-link" href="notifications.html">Notifications</a></li>
<li class="nav-item"><a class="nav-link" href="invoice.html">Invoice</a></li>
<li class="nav-item"><a class="nav-link" href="history.html">History</a></li>
<li class="nav-item"><a class="nav-link" href="checkout.html">Check-Out</a></li>
<li class="nav-item"><a class="nav-link text-warning" href="#" onclick="logout()">🚪 Logout</a></li>
</ul>
</div>
</div>
</nav>

<section class="hero-section text-center text-white" style="background: linear-gradient(135deg, #1e3c72, #2a5298); padding: 60px 0;">
<div class="container">
<h1 class="display-5 fw-bold">Hotel Check-In</h1>
<p>Fast and Secure Self Check-In</p>
</div>
</section>

<div class="container my-5">
<div class="row justify-content-center">
<div class="col-lg-7">
<div class="card shadow-lg border-0">
<div class="card-body p-4">
<h3 class="mb-4 text-center">Guest Information</h3>
<form id="checkinForm">
<div class="mb-3">
<label class="form-label">Guest Name</label>
<input type="text" id="name" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Email</label>
<input type="email" id="email" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Phone Number</label>
<input type="tel" id="phone" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Check-In Date</label>
<input type="date" id="date" class="form-control" required>
</div>
<div class="mb-3">
<label class="form-label">Number of Guests</label>
<select id="guests" class="form-select">
<option>1 Guest</option>
<option>2 Guests</option>
<option>3 Guests</option>
<option>4 Guests</option>
</select>
</div>
<div class="mb-3">
<label class="form-label">Upload ID Proof</label>
<input type="file" id="idProof" class="form-control">
</div>
<button class="btn btn-primary w-100">Check In</button>
</form>
<div id="successBox" class="alert alert-success mt-4 d-none">
✅ Check-In Successful!<br>
Room Assigned: <strong id="assignedRoom"></strong>
</div>
</div>
</div>
</div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js"></script>
</body>
</html>
