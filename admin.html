<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow">
<div class="container">
<a class="navbar-brand fw-bold">🏨 Admin Dashboard</a>
<ul class="navbar-nav ms-auto flex-row">
<li class="nav-item"><a class="nav-link text-warning" href="index.html">🚪 Exit Admin</a></li>
</ul>
</div>
</nav>

<div class="container my-5">
<div class="row g-4">
<div class="col-md-3">
<div class="card dashboard-card bg-primary text-white">
<div class="card-body text-center">
<h5>Total Guests</h5>
<h1 id="totalGuests">0</h1>
</div>
</div>
</div>
<div class="col-md-3">
<div class="card dashboard-card bg-success text-white">
<div class="card-body text-center">
<h5>Occupied Rooms</h5>
<h1 id="occupiedRooms">0</h1>
</div>
</div>
</div>
<div class="col-md-3">
<div class="card dashboard-card bg-warning text-dark">
<div class="card-body text-center">
<h5>Available Rooms</h5>
<h1 id="availableRooms">30</h1>
</div>
</div>
</div>
<div class="col-md-3">
<div class="card dashboard-card bg-danger text-white">
<div class="card-body text-center">
<h5>Today's Check-Ins</h5>
<h1 id="todayCheckins">0</h1>
</div>
</div>
</div>
</div>

<div class="card shadow mt-5">
<div class="card-header bg-dark text-white">Recent Guests</div>
<div class="card-body">
<table class="table table-hover">
<thead><tr><th>Name</th><th>Room</th><th>Status</th></tr></thead>
<tbody id="recentGuestsTable">
<tr><td colspan="3" class="text-center">No guests yet</td></tr>
</tbody>
</table>
</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
