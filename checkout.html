<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Check Out</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow">
<div class="container">
<a class="navbar-brand fw-bold">🏨 Hotel Portal</a>
<ul class="navbar-nav ms-auto flex-row">
<li class="nav-item me-3"><a class="nav-link" href="checkin.html">Check-In</a></li>
<li class="nav-item me-3"><a class="nav-link" href="room.html">My Room</a></li>
<li class="nav-item me-3"><a class="nav-link" href="profile.html">Profile</a></li>
<li class="nav-item"><a class="nav-link text-warning" href="#" onclick="logout()">🚪 Logout</a></li>
</ul>
</div>
</nav>

<div class="container my-5">
<div class="row justify-content-center">
<div class="col-lg-6">
<div class="card shadow-lg">
<div class="card-header bg-danger text-white text-center">
<h3>Guest Check-Out</h3>
</div>
<div class="card-body p-4">
<form id="checkoutForm">
<div class="mb-3">
<label class="form-label">Guest Name</label>
<input type="text" class="form-control" id="guestName" required>
</div>
<div class="mb-3">
<label class="form-label">Room Number</label>
<input type="text" class="form-control" id="roomNo" required>
</div>
<button class="btn btn-danger w-100">Check Out</button>
</form>
<div id="checkoutMsg" class="alert alert-success mt-4 d-none">
✅ Check-Out Successful<br>Thank You For Staying With Us
</div>
</div>
</div>
</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
