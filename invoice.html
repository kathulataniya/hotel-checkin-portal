<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invoice</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar navbar-dark bg-primary shadow">
<div class="container">
<a class="navbar-brand fw-bold">🏨 Hotel Portal</a>
<ul class="navbar-nav ms-auto flex-row">
<li class="nav-item me-3"><a class="nav-link" href="checkin.html">Check-In</a></li>
<li class="nav-item me-3"><a class="nav-link" href="room.html">My Room</a></li>
<li class="nav-item me-3"><a class="nav-link" href="profile.html">Profile</a></li>
<li class="nav-item"><a class="nav-link text-warning" href="#" onclick="logout()">🚪 Logout</a></li>
</ul>
</div>
</nav>

<div class="container my-5">
<div class="card shadow-lg">
<div class="card-body p-5">
<div class="text-center mb-4">
<h1>🏨 HOTEL INVOICE</h1>
<hr>
</div>
<div class="row">
<div class="col-md-6">
<p><strong>Guest Name:</strong> <span id="guestName"></span></p>
<p><strong>Room Number:</strong> <span id="roomNo"></span></p>
</div>
<div class="col-md-6 text-end">
<p>Invoice No: INV00<span id="invNum"></span></p>
<p>Date: <span id="invoiceDate"></span></p>
</div>
</div>
<table class="table table-bordered mt-4">
<thead class="table-primary">
<tr><th>Description</th><th>Amount</th></tr>
</thead>
<tbody>
<tr><td>Room Charges (per night)</td><td>₹<span id="roomCharges">3000</span></td></tr>
<tr><td>Service Charges</td><td>₹500</td></tr>
<tr><td>Food Charges</td><td>₹<span id="foodCharges">1000</span></td></tr>
<tr class="table-success"><td><strong>Total</strong></td><td><strong>₹<span id="totalAmount">4500</span></strong></td></tr>
</tbody>
</table>
<button onclick="window.print()" class="btn btn-success">🖨️ Print Invoice</button>
</div>
</div>
</div>

<script src="script.js"></script>
</body>
</html>
